---
- name: Configure Dynamic MOTD
  hosts: all
  become: yes
  tasks:
    - name: Install dependencies (figlet, ruby, rubygems, and zsh)
      apt:
        name:
          - figlet
          - ruby
          - ruby-dev
          - zsh
        state: present
        update_cache: yes

    - name: Install lolcat via gem
      gem:
        name: lolcat
        state: present
        user_install: no

    - name: Remove system MOTD script (we'll use .zshrc instead)
      file:
        path: /etc/update-motd.d/99-custom-motd
        state: absent

    - name: Remove static MOTD file
      file:
        path: /etc/motd
        state: absent

    - name: Change root default shell to zsh
      user:
        name: root
        shell: /bin/zsh

    - name: Add colorful banner to .zshrc
      blockinfile:
        path: /root/.zshrc
        marker: "# {mark} ANSIBLE MANAGED BLOCK - MOTD"
        block: |
          # Display custom banner on shell start
          figlet -f 3d "drego" -t | /usr/games/lolcat
        create: yes
        insertafter: EOF

    - name: Remove from .bashrc (we only use zsh)
      lineinfile:
        path: /root/.bashrc
        line: '/etc/update-motd.d/99-custom-motd'
        state: absent
